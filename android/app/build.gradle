plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// AGP only auto-generates ~/.android/debug.keystore when its own built-in
// "debug" signing config is used. We reference that same path from a custom
// config (see signingConfigs.release below) for CI release builds without a
// real key.properties, so on a fresh machine (no prior `flutter run`) it
// needs to be created here the same way AGP would.
def fallbackDebugKeystore = file("${System.getProperty('user.home')}/.android/debug.keystore")
if (!keystoreProperties['storeFile'] && !fallbackDebugKeystore.exists()) {
    fallbackDebugKeystore.parentFile.mkdirs()
    exec {
        commandLine 'keytool', '-genkey', '-v',
            '-keystore', fallbackDebugKeystore.absolutePath,
            '-storepass', 'android', '-alias', 'androiddebugkey', '-keypass', 'android',
            '-keyalg', 'RSA', '-keysize', '2048', '-validity', '10000',
            '-dname', 'CN=Android Debug,O=Android,C=US'
    }
}

android {
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = 17
    }

    defaultConfig {
        applicationId "fr.nytuo.diapason"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }
    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            } else {
                // No key.properties (e.g. in CI): fall back to the standard
                // Android debug keystore, which build tools auto-generate if
                // missing. Not for store distribution, just so release builds
                // (minification etc.) can still produce an installable APK.
                storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
        def debugKeyStoreFile = keystoreProperties['debugKeystoreFile']
        if (debugKeyStoreFile != null) {
            debug {
                storeFile file(debugKeyStoreFile)
                storePassword keystoreProperties['debugKeystorePassword']
                keyAlias keystoreProperties['debugKeyAlias']
                keyPassword keystoreProperties['debugKeyPassword']
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            resValue "string", "app_name", "Diapason"
            // shrinkResources false
            // minifyEnabled false
        }
        profile {
            if (signingConfigs.hasProperty('profile')) {
                signingConfig signingConfigs.profile
            }
            applicationIdSuffix '.profile'
            // minifyEnabled true // avoid dexing issues
            resValue "string", "app_name", "Diapason Profile"
        }
        debug {
            if (signingConfigs.hasProperty('debug')) {
                signingConfig signingConfigs.debug
            }
            applicationIdSuffix '.debug'
            // minifyEnabled true // avoid dexing issues
            resValue "string", "app_name", "Diapason Debug"
        }
    }
    namespace 'fr.nytuo.diapason'
    lint {
        disable 'InvalidPackage'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.mediarouter:mediarouter:1.8.1'
    implementation "androidx.core:core-splashscreen:1.2.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2"
}
