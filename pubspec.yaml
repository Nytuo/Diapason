  flutter_gen_runner: 5.13.0+1
  chopper_generator: ^8.0.0
  flutter_native_splash: ^2.4.7
  hive_ce_generator: ^1.8.1
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  isar_generator:
    git:
      url: https://github.com/callumw-k/isar.git
      ref: f070a067378c215b9212a2a22ea593293671c9c9
      path: packages/isar_generator
  msix: ^3.16.9

dependency_overrides:
  isar:
    git:
      url: https://github.com/Komodo5197/isar-community.git
      ref: a602cd8999048faba043f7e1ce7ba92f4d812762
      path: packages/isar

flutter:
  uses-material-design: true
  assets:
    - images/diapason.png
    - images/album_white.png
    - images/diapason_cropped.png
    - images/diapason_glyph.png
    - images/jellyfin-icon-transparent.png
    - assets/icon/icon_square_bg-black.png
    - assets/icon/icon_combined.png
    - assets/icon/icon_square_bg-white.png
    - assets/icon/icon_white_noborder.png
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_combined.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_background: "#185AA0"
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon_combined_macos.png"

msix_config:
  display_name: Diapason
  publisher_display_name: Nytuo
  identity_name: fr.nytuo.diapason
  msix_version: 0.10.0.0
  logo_path: ./images/diapason_cropped.png
  trim_logo: false 
  capabilities: internetClient,musicLibrary,privateNetworkClientServer
  enable_at_startup: false
  certificate_path: ./windows/runner/resources/FINAMP_MSIX_LOCAL_CERTIFICATE_NEW.pfx
  certificate_password: finamp
  build_windows: false
  protocol_activation: diapason
