name: Build

# Manual only: nothing builds on push, pull request or tag. Every run builds
# and publishes a draft release. The slow, unreliable extras are opt-in toggles
# so they can never block one.
#   gh workflow run .github/workflows/build.yml --ref <branch name>
#   gh workflow run .github/workflows/build.yml -f release_tag=0.10.0
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish (e.g. 0.10.0). Defaults to the pubspec version.'
        required: false
        default: ''
      run_integration_tests:
        description: 'Run the emulator integration tests'
        type: boolean
        default: false
      build_extras:
        description: 'Also build Snap and Flatpak'
        type: boolean
        default: false

env:
  # Emulator-driven and slow, so they never run as part of ordinary builds or
  # releases. Tick "Run the emulator integration tests" on a manual run instead.
  # On non-dispatch events this input is null, so the steps are skipped.
  if_condition: &integration_if inputs.run_integration_tests

# Due to a flutter bug, flutter build is not generating localizations
# workaround by always running flutter pub get immediately before building,
# and performing build for msix:create manually to allow implementing this workaround
#
# Desktop builds are unsigned: they are for testing and for the auto-updater's
# release assets, not for store distribution.
jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
    
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'
  
    - name: Free up disk space
      run: |
        # Remove .NET SDKs
        sudo rm -rf /usr/share/dotnet
        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift
        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup
        # Remove Julia
        sudo rm -rf /usr/local/julia*
        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell
        df -h

    # Use the same flutter setup as the linux build to allow sharing the pub cache and it utilizing the same cache key
    - name: Determine Flutter stable version
      uses: subosito/flutter-action@v2
      id: flutter-version
      with:
        architecture: 'x64'
        channel: 'stable'
        dry-run: true
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        # Prebuilt ARM linux builds are not provided, so build flutter from source
        channel: master
        flutter-version: "${{ steps.flutter-version.outputs.VERSION }}"
        cache: false
        pub-cache: true
        # Include arch as linux aarch64 include isar overriding
        # arch can be removed later once isar aarch64 is easily available on pub.dev and overriding is not needed anymore
        pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"

    
    - name: Gradle cache
      uses: actions/cache@v5
      with: 
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        # If exact match is not found, fallback to OS match
        restore-keys: ${{ runner.os }}-gradle-

    - name: Cache Dart build cache
      uses: actions/cache@v5
      with:
        path: |
          .dart_tool
          build
        key: ${{ runner.os }}-android-dart-build-${{ hashFiles('pubspec.lock') }}
        restore-keys: ${{ runner.os }}-android-dart-build-

    - run: flutter doctor
    - run: flutter pub get

    - run: flutter build apk --release --no-pub

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-android-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk
        compression-level: 0 # no compression

    - run: flutter build appbundle --release --no-pub

    - name: Enable KVM group perms
      if: *integration_if
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Integration tests on api 36
      if: *integration_if
      timeout-minutes: 20
      # android emulator is flaky so we retry once
      uses: Wandalen/wretry.action@v3.8.0
      with:
        action: reactivecircus/android-emulator-runner@v2
        # Use the newest supported version of android
        with: |
          api-level: 36
          arch: x86_64
          profile: pixel
          disk-size: 5120M
          script: |
            adb logcat -c
            adb logcat &
            timeout 13m flutter test integration_test/test_cases.dart -d emulator

    - name: Run Integration tests on api 25
      if: *integration_if
      timeout-minutes: 20
      # android emulator is flaky so we retry once
      uses: Wandalen/wretry.action@v3.8.0
      with:
        action: reactivecircus/android-emulator-runner@v2
        # We can't use the oldest supported version api 24 because it doesn't recognize the certificates
        # used by the demo server, so we use the second-oldest api 25.
        with: |
          api-level: 25
          arch: x86_64
          profile: pixel
          disk-size: 5120M
          script: |
            adb logcat -c
            adb logcat &
            timeout 13m flutter test integration_test/test_cases.dart -d emulator

  build-ios:
    name: Build for iOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false
        pub-cache: true

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: |
          ios/Pods
          ~/.cocoapods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: ${{ runner.os }}-pods-

    - name: Cache Dart build cache
      uses: actions/cache@v5
      with:
        path: |
          .dart_tool
          build
        key: ${{ runner.os }}-dart-build-${{ hashFiles('pubspec.lock') }}
        restore-keys: ${{ runner.os }}-dart-build-

    - run: flutter doctor
    - run: flutter pub get

    - run: flutter build ios --release --no-pub --no-codesign

    # No signing identity here (--no-codesign), so this is an unsigned IPA:
    # useful as a release artifact / for resigning, not for direct install.
    # An IPA is just a zip of a Payload/ dir containing the .app.
    - name: Package IPA
      run: |
        mkdir -p build/ios/ipa/Payload
        cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Diapason.app
        (cd build/ios/ipa && zip -qr "$GITHUB_WORKSPACE/diapason-ios.ipa" Payload)

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-ios
        path: diapason-ios.ipa
        compression-level: 0 # already compressed

    # `model` is matched as a literal device name, not a regex, and both it and
    # os_version shift with the runner image. Constrain to iOS only and let the
    # action pick whatever device is actually installed.
    - name: Start simulator
      id: simulator
      if: *integration_if
      uses: futureware-tech/simulator-action@v5
      with:
        os: 'iOS'
        wait_for_boot: true
        erase_before_boot: true
        boot_timeout_seconds: 360

    - name: Run Integration Tests
      if: *integration_if
      run: flutter test integration_test/test_cases.dart -d ${{ steps.simulator.outputs.udid }}

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    # libmpv/mpv are required by media_kit_libs_linux, the rest is the standard
    # Flutter Linux desktop toolchain.
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev mpv

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false
        pub-cache: true

    - name: Cache Dart build cache
      uses: actions/cache@v5
      with:
        path: |
          .dart_tool
          build
        key: ${{ runner.os }}-linux-dart-build-${{ hashFiles('pubspec.lock') }}
        restore-keys: ${{ runner.os }}-linux-dart-build-

    - run: flutter doctor
    - run: flutter pub get
    - run: flutter build linux --release --no-pub

    - name: Package build
      run: tar -czf diapason-linux-x64.tar.gz -C build/linux/x64/release/bundle .

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-linux-x64
        path: diapason-linux-x64.tar.gz
        compression-level: 0 # already compressed

    # fpm builds both deb and rpm from one staging tree; rpm/rpmbuild is needed
    # for the rpm target, and linuxdeploy assembles the AppImage.
    - name: Install packaging tools
      run: |
        sudo apt-get install -y rpm ruby ruby-dev
        sudo gem install --no-document fpm
        curl -sSLo linuxdeploy.AppImage \
          https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy.AppImage

    - name: Build deb / rpm / AppImage
      run: linux/packaging/build-packages.sh

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-linux-packages
        path: build/linux/packages/*
        compression-level: 0 # already compressed

  # Flatpak and Snap build in containers that need their own toolchain and are
  # the least reliable jobs here, so they are opt-in and never gate a release.
  build-flatpak:
    name: Build Flatpak
    if: inputs.build_extras
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
    - uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        # jq is required by subosito/flutter-action's setup script. xz-devel is
        # the Fedora liblzma (lzma-sdk-devel is the unrelated 7-Zip SDK), and
        # pkgconf-pkg-config is needed for CMake's GTK lookup. gcc/rust are for
        # flutter_discord_rpc's cargokit build, which the GitHub runner image
        # provides preinstalled but this container does not.
        dnf install -y ninja-build cmake clang gcc gtk3-devel xz-devel pkgconf-pkg-config \
          mpv-libs-devel curl git unzip xz which jq rust cargo

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false
        pub-cache: true

    # Flutter can't build inside the flatpak sandbox (no network for pub get, no
    # Flutter SDK extension), so the bundle is built here and the manifest just
    # installs the staged tree.
    - name: Build Flutter bundle
      run: |
        git config --global --add safe.directory '*'
        flutter doctor
        flutter pub get
        # flutter hides the underlying ninja failure, so re-run ninja verbosely
        # to surface the actual compiler/cargokit error before giving up.
        flutter build linux --release --no-pub --verbose || {
          echo "=== flutter build failed; re-running ninja for the real error ==="
          ninja -C build/linux/x64/release -v || true
          exit 1
        }

    - name: Stage bundle for the manifest
      run: |
        mkdir -p flatpak/staging
        cp -r build/linux/*/release/bundle flatpak/staging/
        sed -e '/^dnl/d' -e 's|__INSTALL_PATH__|/app/bin|g' \
          assets/diapason.desktop.m4 > flatpak/staging/fr.nytuo.diapason.desktop
        cp assets/fr.nytuo.diapason.metainfo.xml flatpak/staging/
        cp assets/icon/linux/256x256/apps/diapason.png flatpak/staging/

    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: diapason.flatpak
        manifest-path: flatpak/fr.nytuo.diapason.yml
        cache-key: flatpak-builder-${{ github.sha }}

  build-snap:
    name: Build Snap
    if: inputs.build_extras
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: snapcore/action-build@v1
      id: snapcraft

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-snap
        path: ${{ steps.snapcraft.outputs.snap }}
        compression-level: 0 # already compressed

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false
        pub-cache: true

    - name: Cache Dart build cache
      uses: actions/cache@v5
      with:
        path: |
          .dart_tool
          build
        key: ${{ runner.os }}-windows-dart-build-${{ hashFiles('pubspec.lock') }}
        restore-keys: ${{ runner.os }}-windows-dart-build-

    - run: flutter doctor
    - run: flutter pub get
    - run: flutter build windows --release --no-pub

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-windows-x64
        path: build/windows/x64/runner/Release/

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false
        pub-cache: true

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: |
          macos/Pods
          ~/.cocoapods
        key: ${{ runner.os }}-macos-pods-${{ hashFiles('macos/Podfile.lock') }}
        restore-keys: ${{ runner.os }}-macos-pods-

    - name: Cache Dart build cache
      uses: actions/cache@v5
      with:
        path: |
          .dart_tool
          build
        key: ${{ runner.os }}-macos-dart-build-${{ hashFiles('pubspec.lock') }}
        restore-keys: ${{ runner.os }}-macos-dart-build-

    - run: flutter doctor
    - run: flutter pub get
    - run: flutter build macos --release --no-pub

    - name: Package build
      run: |
        cd build/macos/Build/Products/Release
        zip -r -y "$GITHUB_WORKSPACE/diapason-macos.zip" Diapason.app
        # A drag-to-Applications dmg, in addition to the zip: nicer UX for end
        # users than unzipping. Unsigned/unnotarized either way, same as the zip.
        mkdir -p "$GITHUB_WORKSPACE/dmg-staging"
        cp -r Diapason.app "$GITHUB_WORKSPACE/dmg-staging/"
        ln -s /Applications "$GITHUB_WORKSPACE/dmg-staging/Applications"
        hdiutil create -volname Diapason -srcfolder "$GITHUB_WORKSPACE/dmg-staging" \
          -ov -format UDZO "$GITHUB_WORKSPACE/diapason-macos.dmg"

    - uses: actions/upload-artifact@v6
      with:
        name: diapason-macos
        path: |
          diapason-macos.zip
          diapason-macos.dmg
        compression-level: 0 # already compressed

  # Publishes a draft release from the artifacts the jobs above produced.
  # Flatpak and Snap are deliberately absent from needs — they are opt-in, and
  # a skipped dependency would skip this job too.
  release:
    name: Create release
    needs:
      - build-android
      - build-ios
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    # The run's ref_name is whatever branch was dispatched, not a version, so
    # the tag comes from the input and falls back to the pubspec version.
    - name: Resolve release tag
      id: tag
      run: |
        set -eu
        TAG="${{ inputs.release_tag }}"
        if [ -z "$TAG" ]; then
          TAG="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d+ -f1)"
        fi
        echo "Releasing as '$TAG'"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Download build artifacts
      uses: actions/download-artifact@v6
      with:
        path: artifacts

    - name: Collect release assets
      run: |
        set -eux
        # A dedicated directory, not "assets" — the repo checkout already has
        # an assets/ dir (app assets, e.g. assets/icon/) that "assets/*" would
        # also glob, and gh release upload chokes on directory entries.
        mkdir -p release-assets
        # Windows uploads an uncompressed directory, so it needs zipping to
        # become a single asset. Everything else is already one packaged file.
        if [ -d artifacts/diapason-windows-x64 ]; then
          (cd artifacts/diapason-windows-x64 && zip -qr "$GITHUB_WORKSPACE/release-assets/diapason-windows-x64.zip" .)
        fi
        find artifacts -type f \
          \( -name '*.apk' -o -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \
             -o -name '*.AppImage' -o -name '*.zip' -o -name '*.snap' -o -name '*.flatpak' \
             -o -name '*.ipa' -o -name '*.dmg' \) \
          -exec cp {} release-assets/ \;
        ls -lh release-assets

    # --target creates the tag at this commit when it doesn't already exist,
    # which is the normal case for a manual run.
    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ steps.tag.outputs.tag }}
      run: |
        gh release create "$TAG" \
          --repo "${{ github.repository }}" \
          --target "${{ github.sha }}" \
          --title "$TAG" \
          --generate-notes \
          --draft \
          release-assets/*
